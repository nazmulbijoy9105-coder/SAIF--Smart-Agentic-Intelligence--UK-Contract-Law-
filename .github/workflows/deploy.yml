name: SAIF CI/CD
on:
  push:
    branches: [main]
jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: cd backend && pip install -r requirements.txt && pytest app/tests/ -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd frontend && npm ci && npm run build
        env: { NEXT_PUBLIC_API_URL: 'http://test.test', NEXT_PUBLIC_SUPABASE_URL: 'http://test.test', NEXT_PUBLIC_SUPABASE_ANON_KEY: 'test' }

  deploy:
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploy triggered. Configure Render/Vercel auto-deploy from GitHub."
