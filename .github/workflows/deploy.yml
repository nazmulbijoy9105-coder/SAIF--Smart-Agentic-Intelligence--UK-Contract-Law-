name: SAIF CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-check:
    name: Backend Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Python syntax check
        run: |
          python -m py_compile main.py
          python -m py_compile app/utils/config.py
          python -m py_compile app/utils/logger.py
          python -m py_compile app/utils/auth.py
          python -m py_compile app/utils/rate_limiter.py
          python -m py_compile app/db/supabase_client.py
          python -m py_compile app/ilrmf/fjr_engine.py
          python -m py_compile app/ilrmf/engine.py
          python -m py_compile app/validators/citation_checker.py
          python -m py_compile app/routers/health.py
          python -m py_compile app/routers/auth.py
          python -m py_compile app/routers/assess.py
          python -m py_compile app/routers/payment.py
          python -m py_compile app/routers/admin.py
          echo "✅ All Python files compiled successfully"

  frontend-check:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build check
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:8000
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test_key_placeholder
